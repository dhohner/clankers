<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PRD Template</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --paper: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #2563eb;
        --accent-soft: #dbeafe;
        --success-soft: #dcfce7;
        --warning-soft: #fef3c7;
        --danger-soft: #fee2e2;
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 280px);
        color: var(--ink);
        font:
          16px/1.6 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }

      .page {
        width: min(1080px, calc(100% - 32px));
        margin: 40px auto;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      header.hero {
        padding: 44px 52px 34px;
        border-bottom: 1px solid var(--line);
        background:
          radial-gradient(
            circle at top right,
            rgba(37, 99, 235, 0.14),
            transparent 32%
          ),
          linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 5vw, 4rem);
        line-height: 1.05;
        letter-spacing: -0.05em;
      }

      .subtitle {
        max-width: 760px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 26px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.75);
        color: #374151;
        font-size: 0.88rem;
        font-weight: 650;
      }

      main {
        padding: 18px 52px 52px;
      }

      section {
        padding: 30px 0;
        border-bottom: 1px solid var(--line);
      }

      section:last-child {
        border-bottom: 0;
      }

      h2 {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0 0 14px;
        font-size: 1.45rem;
        line-height: 1.25;
        letter-spacing: -0.02em;
      }

      h2 .num {
        display: inline-grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.95rem;
        font-weight: 800;
        flex: 0 0 auto;
      }

      h3 {
        margin: 24px 0 8px;
        font-size: 1.05rem;
        letter-spacing: -0.01em;
      }

      p {
        margin: 0 0 14px;
      }
      ul,
      ol {
        margin: 10px 0 0 1.25rem;
        padding: 0;
      }
      li {
        margin: 8px 0;
        padding-left: 2px;
      }
      strong {
        font-weight: 750;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px 18px;
        background: #fbfdff;
      }

      .card h3 {
        margin-top: 0;
      }
      .callout {
        margin-top: 16px;
        padding: 14px 16px;
        border-left: 4px solid var(--accent);
        border-radius: 12px;
        background: #eff6ff;
      }

      .assumptions {
        background: var(--success-soft);
      }
      .open-questions {
        background: var(--warning-soft);
      }
      .risk {
        background: var(--danger-soft);
      }

      code {
        padding: 0.15em 0.35em;
        border-radius: 6px;
        background: #f3f4f6;
        font-size: 0.92em;
      }

      @media print {
        body {
          background: #fff;
        }
        .page {
          width: 100%;
          margin: 0;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }
        header.hero,
        main {
          padding-left: 28px;
          padding-right: 28px;
        }
        section {
          break-inside: avoid;
        }
      }

      @media (max-width: 760px) {
        .page {
          width: 100%;
          margin: 0;
          border-radius: 0;
        }
        header.hero,
        main {
          padding-left: 24px;
          padding-right: 24px;
        }
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <article class="page">
      <header class="hero">
        <p class="eyebrow">Product Requirements Document</p>
        <h1><!-- Feature title --></h1>
        <p class="subtitle">
          <!-- One-paragraph executive summary of the problem and proposed outcome. -->
        </p>
        <div class="meta" aria-label="Document metadata">
          <span class="pill">Status: Draft</span>
          <!-- Optional metadata pills, for example Created: 2026-05-28 or Owner: Product Advisory -->
        </div>
      </header>

      <main>
        <section id="problem-statement">
          <h2><span class="num">1</span>Problem Statement</h2>
          <!-- Describe the problem from the user's perspective: what is painful, blocked, risky, or inefficient today; who experiences it; and why it is worth solving now. -->
        </section>

        <section id="solution">
          <h2><span class="num">2</span>Solution</h2>
          <!-- Describe the intended solution from the user's perspective. Focus on future behavior and workflow, not implementation mechanics. -->
        </section>

        <section id="user-stories">
          <h2><span class="num">3</span>User Stories</h2>
          <ol>
            <!-- Add a numbered list of user stories in the form: As an <actor>, I want a <feature>, so that <benefit>. -->
          </ol>
        </section>

        <section id="implementation-decisions">
          <h2><span class="num">4</span>Implementation Decisions</h2>
          <!-- Record stable technical and product decisions that shape execution, such as capability areas, contracts, architecture choices, schema or API implications, and ambiguity-resolving clarifications. -->
        </section>

        <section id="testing-decisions">
          <h2><span class="num">5</span>Testing Decisions</h2>
          <!-- Capture what good verification looks like: risky behaviors, direct test targets, and externally visible outcomes a good test proves. -->
        </section>

        <section id="out-of-scope">
          <h2><span class="num">6</span>Out of Scope</h2>
          <!-- Name intentionally excluded work to prevent quiet scope creep during issue slicing. -->
        </section>

        <section id="further-notes">
          <h2><span class="num">7</span>Further Notes</h2>
          <div class="summary-grid">
            <!-- Add cards only for sections that have meaningful content.
          <div class="card assumptions">
            <h3>Assumptions</h3>
            <p>...</p>
          </div>
          <div class="card open-questions">
            <h3>Open Questions</h3>
            <p>...</p>
          </div>
          <div class="card">
            <h3>Rollout / Migration Notes</h3>
            <p>...</p>
          </div>
          --></div>
        </section>
      </main>
    </article>
  </body>
</html>
