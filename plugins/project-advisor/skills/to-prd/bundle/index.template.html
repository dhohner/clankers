<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{SUMMARY}}" />
    <title>PRD · {{TITLE}}</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script src="./assets/app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <div class="app-shell">
      <aside class="sidebar" aria-label="PRD navigation">
        <div class="sidebar-header">
          <a class="brand" href="#summary" aria-label="Project Advisor PRD home">
            <svg class="brand-mark" viewBox="0 0 44 44" aria-hidden="true">
              <path d="M7 7h12v12H7zM25 7h12v12H25zM7 25h12v12H7z" />
              <path class="brand-mark-accent" d="M25 25h12v12H25z" />
            </svg>
            <span><strong>Project Advisor</strong><small>Product review surface</small></span>
          </a>
          <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false"
            aria-controls="sidebar-panel" aria-label="Open document navigation">
            <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
          </button>
        </div>
        <div id="sidebar-panel" class="sidebar-panel">
          <nav aria-label="Document sections">{{NAVIGATION}}</nav>
          <div class="sidebar-actions" role="group" aria-label="Review controls">
            {{DETAILS_CONTROL}}
            <button id="print-document" type="button">Print / Save PDF</button>
          </div>
        </div>
      </aside>
      <main id="content" tabindex="-1">
        <header id="summary" class="hero" aria-labelledby="document-title">
          <div class="hero-topline">
            <span class="eyebrow">Product Requirements Document</span>
            <span class="status" role="status" aria-label="Document status: {{STATUS}}">{{STATUS}}</span>
          </div>
          <h1 id="document-title">{{TITLE}}</h1>
          <p class="lede">{{SUMMARY}}</p>
          <dl class="metadata">{{METADATA}}</dl>
        </header>
        {{BLOCKS}}
        <footer>
          <span>{{STATUS}}</span>
          <a href="#summary">Back to top</a>
        </footer>
      </main>
    </div>
  </body>
</html>
