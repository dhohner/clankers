schema_version: 1
slug: "fixture-architecture-heavy"
title: "Architecture-heavy PRD fixture"
summary: The boundary between agent judgment and deterministic generation must remain explicit.
status: Draft
initiative_type: "architecture-heavy"
review_surfaces:
  - document
  - architecture
metadata:
  Owner: Evaluation
blocks:
  problem:
    statement: Planning quality degrades when product judgment and rendering responsibilities are conflated.
    evidence:
      - The workflow needs portable deterministic output without constraining agent discovery.
  architecture_diagram:
    description: Agent discovery produces a manifest; the generator validates and publishes a portable bundle for human review.
    source: |-
      flowchart TB
        agent[Agent judgment] -->|Author| manifest[YAML manifest]
        manifest -->|Validate| generator[Deterministic generator]
        generator -->|Publish| bundle[Review bundle]
  system_context:
    description: The workflow uses repository evidence and user decisions without requiring a particular agent harness.
    source: |-
      flowchart TB
        user[Reviewer] -->|Decisions| agent[Planning agent]
        repo[Repository] -->|Evidence| agent
        agent -->|Generate| bundle[Portable PRD bundle]
  decisions:
    - id: "DEC-RESPONSIBILITY-BOUNDARY"
      decision: Agents own product judgment; the generator owns deterministic publication.
      rationale: The boundary preserves adaptability and repeatability.
  risks:
    - id: "RISK-HARNESS-DEPENDENCY"
      risk: "The workflow assumes a Codex-specific preview or runtime."
      mitigation: "Keep generation standard-library-only and make preview capabilities optional."
      relates_to:
        - "DEC-RESPONSIBILITY-BOUNDARY"
