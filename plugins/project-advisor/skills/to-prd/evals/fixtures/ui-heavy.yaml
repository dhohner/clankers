schema_version: 1
slug: "fixture-ui-heavy"
title: "UI-heavy PRD fixture"
summary: "A review queue needs visible empty, ready, and blocked states."
status: Draft
initiative_type: "ui-heavy"
review_surfaces:
  - document
  - ui
metadata:
  Owner: Evaluation
blocks:
  problem:
    statement: Reviewers cannot distinguish actionable drafts from blocked drafts at a glance.
    evidence:
      - State and hierarchy require visual review.
  requirements:
    - id: "REQ-QUEUE-STATES"
      title: Distinct review states
      description: "The queue communicates empty, ready, and blocked states without relying on color alone."
      validation:
        - "TEST-QUEUE-STATES"
  wireframes:
    - screen: Review queue
      intent: "Compare status, blocker, and next-action hierarchy."
      regions:
        - label: Draft list
          detail: Each draft exposes status and the next useful action.
  testing_strategy:
    - id: "TEST-QUEUE-STATES"
      target: Queue states
      expected_outcome: "Keyboard and screen-reader users can identify each state and next action."
      validates:
        - "REQ-QUEUE-STATES"
