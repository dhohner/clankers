schema_version: 1
slug: "fixture-workflow-heavy"
title: "Workflow-heavy PRD fixture"
summary: "A draft moves through review, revision, acceptance, and optional issue handoff."
status: Draft
initiative_type: "workflow-heavy"
review_surfaces:
  - document
  - workflow
metadata:
  Owner: Evaluation
blocks:
  problem:
    statement: Maintainers need an explicit acceptance boundary before issue creation.
    evidence:
      - The sequence and failure paths determine whether handoff is allowed.
  journeys:
    - current: A draft can be mistaken for an accepted planning source.
      future: Review and acceptance are explicit before issue splitting is offered.
  workflow_diagram:
    description: "The review gate sends requested changes back to manifest revision and only accepted drafts reach issue handoff."
    source: |-
      flowchart TB
        draft[Generated draft] --> review[Human review]
        review --> gate{Accepted?}
        gate -->|Changes requested| revise[Revise manifest]
        revise --> draft
        gate -->|Accepted| handoff[Offer issue handoff]
  failure_paths:
    - scenario: The reviewer requests changes.
      fallback: "Update the manifest, regenerate, validate, and request review again."
  decisions:
    - id: "DEC-ACCEPTANCE-GATE"
      decision: Issue splitting is offered only after human acceptance.
      rationale: Draft content must not become implementation work by implication.
