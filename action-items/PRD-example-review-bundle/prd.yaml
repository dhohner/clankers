schema_version: 1
slug: "example-review-bundle"
title: "Rich Interactive HTML Output for to-prd"
summary: "Replace the fixed, prose-first PRD template with a generated, multi-file review bundle that selects useful structured and visual blocks while remaining portable and source-control friendly."
status: Draft for review
initiative_type: mixed
review_surfaces:
  - document
  - workflow
  - ui
  - architecture
metadata:
  Owner: Project Advisor maintainers
  Primary user: PRD reviewers
  Review mode: "Read-only"
blocks:
  executive_summary:
    metrics:
      - label: Current
        value: 1 fixed template
        description: Prose sections with limited review affordances.
      - label: Target
        value: Adaptive bundle
        description: Composable blocks selected from the feature's review needs.
      - label: Key contract
        value: Traceable decisions
        description: "Stable IDs connect requirements, risks, decisions, and tests."
    recommendation: "Treat HTML as a generated product surface rather than a decorated document. Keep the skill responsible for discovery and judgment while the generator owns deterministic structure, assets, navigation, accessibility, and validation."
  problem:
    statement: "The existing PRD output is a fixed document surface. It cannot adapt its presentation to UI, workflow, API, data, or architecture decisions without authors recreating layout structure."
    evidence:
      - Reviewers must reconstruct relationships mentally while scanning a long page.
      - "Important requirements, risks, decisions, and validation outcomes are difficult to trace."
      - Repeated bordered cards obscure hierarchy instead of improving review speed.
  goals:
    - goal: Make generated PRDs faster to scan and review.
      success_signal: "A reviewer can locate scope, unresolved blockers, and validation coverage from navigation and summary views."
    - goal: Use visual surfaces only when they clarify the initiative.
      success_signal: The selected surface matches the initiative type and retains an accessible text equivalent.
    - goal: Prevent requirement drift during issue splitting.
      success_signal: "Every settled requirement has stable references to relevant decisions, risks, and tests."
    - goal: Produce consistent portable bundles.
      success_signal: The same manifest produces the same structure and copied assets from a conventional command line.
  personas:
    - actor: PRD reviewer
      need: "Scan the proposal, navigate to material decisions, and understand remaining uncertainty."
      outcome: Review effort is spent on product judgment instead of reconstructing document relationships.
    - actor: Project Advisor maintainer
      need: Generate a stable review artifact without recreating page structure for every PRD.
      outcome: Layout and interaction regressions are fixed once in versioned generator assets.
  workflow_diagram:
    description: "The future workflow moves from interview and repository evidence through scope decisions, generation, review, revision, and issue handoff."
    source: |-
      flowchart TB
        subgraph "01 Discovery"
          interview[Interview] --> scope[Scope decisions]
        end
        subgraph "02 Publication"
          scope --> manifest[prd.yaml manifest]
          manifest --> generator[Validate and render bundle]
        end
        generator --> review[Human review]
        review --> accepted{Accepted?}
        accepted -->|Revise| scope
        accepted -->|Accept| handoff[Optional issue handoff]
    native: null
  requirements:
    - title: "Portable multi-file bundle"
      description: "Generate index.html with versioned companion CSS, JavaScript, and other local assets."
      id: "req-01"
      relates_to:
        - "dec-01"
        - "risk-01"
      validation:
        - "test-01"
      label: "REQ-01"
      evidence: []
    - title: "Reference-aligned layout"
      description: "Render a persistent navigation rail, outcome-first hero, flat content hierarchy, and purpose-specific section layouts."
      id: "req-02"
      relates_to:
        - "dec-02"
        - "risk-02"
      validation:
        - "test-02"
      label: "REQ-02"
      evidence: []
    - title: "Review-only interaction"
      description: "Support navigation, details, anchors, and printing without persisting reviewer data."
      id: "req-03"
      relates_to:
        - "dec-03"
        - "risk-03"
      validation:
        - "test-03"
      label: "REQ-03"
      evidence: []
    - title: Stable traceability
      description: "Assign stable IDs and expose relationships between requirements, decisions, risks, questions, and validation outcomes."
      id: "req-04"
      relates_to:
        - "dec-04"
        - "risk-04"
      validation:
        - "test-04"
      label: "REQ-04"
      evidence: []
  capability_map:
    - capability: Framing
      outcome: "Summary, status, metadata, problem evidence, goals, and non-goals."
    - capability: People and workflow
      outcome: "Actors, journeys, workflow diagrams, state transitions, and failure paths."
    - capability: Product definition
      outcome: "Requirements, scope, business rules, decisions, and alternatives."
    - capability: Visual experience
      outcome: "Wireframes, annotated states, UI flows, and design direction."
    - capability: Technical contracts
      outcome: "Architecture, data flow, APIs, models, lifecycle, and code evidence."
    - capability: Delivery and assurance
      outcome: "Dependencies, risks, rollout, testing, traceability, and repository grounding."
  scope:
    in:
      - "Reference-aligned document shell and responsive navigation"
      - "Purpose-specific renderers for common PRD blocks"
      - Mermaid and native visual review surfaces
      - "Print-safe output"
    out:
      - Persisted comments or approvals
      - Editable PRD content in the generated artifact
      - Migration of previously generated PRDs
  decisions:
    - decision: Bundles may contain companion assets.
      rationale: "Portability means a self-contained directory, not necessarily one HTML file."
      id: "dec-01"
      relates_to:
        - "req-01"
      label: "DEC-01"
      evidence: []
    - decision: The rich interactive PRD is the visual contract.
      rationale: "Generated artifacts should share its spacing, hierarchy, navigation, and bounded-surface rules."
      id: "dec-02"
      relates_to:
        - "req-02"
      label: "DEC-02"
      evidence: []
    - decision: "Review interactions are local and read-only."
      rationale: Reviewers may inspect generated views without changing or persisting PRD data.
      id: "dec-03"
      relates_to:
        - "req-03"
      label: "DEC-03"
      evidence: []
    - decision: Traceability is generated from manifest IDs.
      rationale: "Relationships remain deterministic and validator-friendly."
      id: "dec-04"
      relates_to:
        - "req-04"
      label: "DEC-04"
      evidence: []
  architecture_diagram:
    description: "Interview state and repository evidence become a manifest, then a reusable generator produces and validates the portable review bundle."
    source: ""
    native:
      nodes:
        - id: discovery
          label: Discovery state
        - id: manifest
          label: YAML manifest
        - id: generator
          label: Reusable generator
        - id: bundle
          label: PRD bundle
        - id: review
          label: Review handoff
      edges:
        - from: discovery
          to: manifest
          label: Shape
        - from: manifest
          to: generator
          label: Validate
        - from: generator
          to: bundle
          label: Render
        - from: bundle
          to: review
          label: Verify
  risks:
    - risk: A partial bundle appears complete.
      mitigation: Validate first and publish only after all files are written.
      id: "risk-01"
      relates_to:
        - "req-01"
      label: "RISK-01"
      evidence: []
    - risk: Generic renderers flatten meaningful hierarchy.
      mitigation: "Use block-specific semantic markup and visual regression fixtures."
      id: "risk-02"
      relates_to:
        - "req-02"
      label: "RISK-02"
      evidence: []
    - risk: A generated review surface is mistaken for editable product UI.
      mitigation: Label generated surfaces as review aids and never persist state.
      id: "risk-03"
      relates_to:
        - "req-03"
      label: "RISK-03"
      evidence: []
    - risk: Generated links imply false coverage.
      mitigation: Validate references and require semantically reviewed relationships.
      id: "risk-04"
      relates_to:
        - "req-04"
      label: "RISK-04"
      evidence: []
  rollout:
    - phase: Shell alignment
      outcome: "Align the shell, hero, metadata, section rhythm, and responsive navigation."
    - phase: "Purpose-specific renderers"
      outcome: "Introduce purpose-specific block renderers and representative fixture content."
    - phase: Interaction and visual verification
      outcome: "Verify diagrams, anchors, mobile behavior, and printing."
    - phase: Regression fixture adoption
      outcome: Use the fixture as a regression artifact for future generator changes.
  testing_strategy:
    - target: Bundle completeness
      expected_outcome: index.html and every referenced local asset exist and resolve.
      id: "test-01"
      validates:
        - "req-01"
      label: "TEST-01"
      relates_to: []
      evidence: []
    - target: Reference layout
      expected_outcome: Desktop and mobile screenshots preserve the approved hierarchy and spacing.
      id: "test-02"
      validates:
        - "req-02"
      label: "TEST-02"
      relates_to: []
      evidence: []
    - target: Review controls
      expected_outcome: "Navigation, details, anchors, and print behavior work without persistence."
      id: "test-03"
      validates:
        - "req-03"
      label: "TEST-03"
      relates_to: []
      evidence: []
    - target: Traceability integrity
      expected_outcome: Duplicate IDs and broken relationships are rejected before generation.
      id: "test-04"
      validates:
        - "req-04"
      label: "TEST-04"
      relates_to: []
      evidence: []
  open_questions:
    - question: "Which additional visual regression viewports should become mandatory after the desktop and mobile baselines?"
      id: "question-01"
      relates_to:
        - "req-02"
      label: "QUESTION-01"
      evidence: []
    - question: "Should future manifests support explicit presentation variants or keep layout selection entirely block-driven?"
      id: "question-02"
      relates_to:
        - "req-02"
      label: "QUESTION-02"
      evidence: []
  repository_grounding:
    - reference: "plugins/project-advisor/skills/to-prd/bundle/index.template.html"
      observation: "The template defines the persistent rail, hero metadata, content shell, and review controls."
      implication: The generator shell must encode those structures directly.
    - reference: "plugins/project-advisor/skills/to-prd/bundle/assets/styles.css"
      observation: "Ordinary content is flat while diagrams, tables, details, and callouts are visually bounded."
      implication: Generic card styling cannot be the default content renderer.
    - reference: "plugins/project-advisor/skills/to-prd/bundle/assets/app.js"
      observation: "Interaction is limited to navigation, details, anchors, Mermaid rendering, and print behavior."
      implication: "Generated JavaScript should preserve the same review-only interaction boundary."
    - reference: "plugins/project-advisor/skills/to-prd/scripts/bundle.py::generate_bundle"
      observation: "The generator validates manifests, copies versioned assets, and publishes only after structural checks pass."
      implication: Visual reliability should be added without weakening deterministic generation.
